<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#6c63ff">
  <title>{% block title %}TimTag{% endblock %}</title>

  <!-- Tailwind CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary:   { DEFAULT: '#6c63ff', light: '#ede9ff', dark: '#5548e0' },
            success:   '#22c55e',
            danger:    '#ef4444',
            warning:   '#f59e0b',
            brand_bg:  '#f5f3ff',
          },
          fontFamily: {
            sans: ['Nunito', 'sans-serif'],
          },
          borderRadius: {
            '2xl': '1rem',
            '3xl': '1.5rem',
          }
        }
      }
    }
  </script>

  <!-- Google Fonts + наш CSS -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/main.css">

  <!-- Детские "волшебные" штрихи -->
  <style>
    body {
      background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23c7d2fe' fill-opacity='0.4'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 26v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 6V2H4v4H0v2h4v4h2V8h4V6H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
    }
    main {
      animation: pageIn 0.4s ease-out;
    }
    @keyframes pageIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Пульсация для главной кнопки (используем в index.html) */
    .pulse-glow {
      animation: pulseGlow 2s infinite;
    }
    @keyframes pulseGlow {
      0%, 100% { box-shadow: 0 0 0 0 rgba(108, 99, 255, 0.4); }
      50% { box-shadow: 0 0 0 12px rgba(108, 99, 255, 0); }
    }

    /* Адаптивный навбар */
    .navbar {
      background: rgba(255,255,255,0.85);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid #ede9ff;
    }
  </style>

  <!-- HTMX + App JS -->
  <script src="/static/js/htmx.min.js" defer></script>
  <script src="/static/js/app.js" defer></script>

  {% block extra_head %}{% endblock %}
</head>

<body class="font-sans min-h-screen flex flex-col">

  <nav class="navbar sticky top-0 z-10" style="padding-top: env(safe-area-inset-top);">
    <div class="max-w-lg mx-auto flex items-center justify-between px-4 h-14">
      <a href="/" class="flex items-center gap-2 text-xl font-black text-primary">
        <span class="text-2xl">🎓</span> <span>TimTag</span>
      </a>
      {% block navbar_right %}
        <a href="/" class="text-sm font-semibold text-gray-400 hover:text-primary transition-colors">
          ← На главную
        </a>
      {% endblock %}
    </div>
  </nav>

  <main class="flex-1 max-w-lg mx-auto w-full px-4 pt-6 pb-12">
    {% block content %}{% endblock %}
  </main>

  <footer class="text-center text-xs text-gray-300 py-6">
    TimTag · Учимся с удовольствием 🚀
  </footer>

</body>
</html>
